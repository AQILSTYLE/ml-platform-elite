apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inference
  template:
    metadata:
      labels:
        app: inference
    spec:
      nodeSelector:
        workload: inference
      tolerations:
        - key: "gpu-workload"
          operator: "Equal"
          value: "inference"
          effect: "NoSchedule"
      containers:
        - name: model
          image: 123456789012.dkr.ecr.ap-southeast-1.amazonaws.com/ml-model:latest
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "1"
              memory: "2Gi"
              nvidia.com/gpu: "1"
